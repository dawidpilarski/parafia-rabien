<section class="hero-bg dot-grid relative min-h-screen flex items-center overflow-hidden">

  <!-- Decorative glowing orbs -->
  <div class="absolute top-1/3 left-1/4 w-96 h-96 rounded-full bg-gold/5 blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-72 h-72 rounded-full bg-blue-500/5 blur-3xl pointer-events-none"></div>

  <!-- Floating cross -->
  <div class="absolute top-24 right-12 opacity-8 float hidden lg:block" style="animation-delay: .5s;">
    <svg width="80" height="120" viewBox="0 0 80 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="33" y="0" width="14" height="120" rx="7" fill="#c4a04b" opacity=".15"/>
      <rect x="0" y="34" width="80" height="14" rx="7" fill="#c4a04b" opacity=".15"/>
    </svg>
  </div>
  <div class="absolute bottom-32 left-12 opacity-8 float hidden lg:block">
    <svg width="50" height="75" viewBox="0 0 50 75" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="21" y="0" width="8" height="75" rx="4" fill="#c4a04b" opacity=".15"/>
      <rect x="0" y="20" width="50" height="8" rx="4" fill="#c4a04b" opacity=".15"/>
    </svg>
  </div>

  <div class="relative z-10 max-w-6xl mx-auto px-6 py-40 text-center w-full">

    <!-- Badge -->
    <div class="badge mb-8" data-aos="fade-down" data-aos-delay="100">
      <span class="badge-line"></span>
      Archidiecezja Łódzka · Dekanat Aleksandrowski
      <span class="badge-line"></span>
    </div>

    <!-- Heading -->
    <h1 class="font-serif text-white font-bold leading-[1.1] mb-6" data-aos="fade-up" data-aos-delay="200">
      <span class="block text-5xl md:text-6xl lg:text-7xl mb-2">Parafia</span>
      <span class="block text-4xl md:text-5xl lg:text-6xl gold-text">Zwiastowania Pańskiego</span>
    </h1>

    <p class="font-serif italic text-white/50 text-xl md:text-2xl mb-4" data-aos="fade-up" data-aos-delay="280">
      w Rąbieniu
    </p>

    <p class="text-white/40 text-base md:text-lg max-w-lg mx-auto mb-12" data-aos="fade-up" data-aos-delay="350">
      Wspólnota wiary, nadziei i miłości od 1989 roku
    </p>

    <!-- CTA buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center mb-20" data-aos="fade-up" data-aos-delay="430">
      <a href="#msze"
         class="group inline-flex items-center justify-center gap-2 bg-gold hover:bg-gold2 text-white px-8 py-4 rounded-full font-medium text-lg transition-all hover:-translate-y-1 hover:shadow-xl hover:shadow-gold/30">
        <i class="fas fa-calendar-alt text-sm"></i>
        Porządek Mszy
      </a>
      <a href="#o-parafii"
         class="inline-flex items-center justify-center gap-2 border border-white/20 hover:border-gold text-white/80 hover:text-white px-8 py-4 rounded-full font-medium text-lg transition-all hover:bg-white/5">
        <i class="fas fa-church text-sm"></i>
        O Parafii
      </a>
    </div>

    <!-- Stats strip -->
    <div class="grid grid-cols-3 gap-4 max-w-xl mx-auto" data-aos="fade-up" data-aos-delay="520">
      <div class="text-center py-5 px-3 rounded-2xl bg-white/5 border border-white/8 backdrop-blur">
        <div class="font-serif text-3xl font-bold gold-text">1989</div>
        <div class="text-white/40 text-xs mt-1 uppercase tracking-wider">Rok założenia</div>
      </div>
      <div class="text-center py-5 px-3 rounded-2xl bg-white/5 border border-white/8 backdrop-blur">
        <div class="font-serif text-3xl font-bold gold-text">2 500</div>
        <div class="text-white/40 text-xs mt-1 uppercase tracking-wider">Parafian</div>
      </div>
      <div class="text-center py-5 px-3 rounded-2xl bg-white/5 border border-white/8 backdrop-blur">
        <div class="font-serif text-3xl font-bold gold-text">3</div>
        <div class="text-white/40 text-xs mt-1 uppercase tracking-wider">Msze w niedzielę</div>
      </div>
    </div>
  </div>

  <!-- Scroll caret -->
  <a href="#msze" class="bounce absolute bottom-10 left-1/2 text-gold/50 hover:text-gold transition-colors">
    <i class="fas fa-chevron-down text-2xl"></i>
  </a>
</section>
