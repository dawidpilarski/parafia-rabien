<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  OGŁOSZENIA – KONFIGURACJA                                  ║
  ║                                                              ║
  ║  Edytuj plik: data/ogloszenia.json                          ║
  ║                                                              ║
  ║  Aby WŁĄCZYĆ/WYŁĄCZYĆ ogłoszenie: zmień "enabled": true/false ║
  ║  Aby edytować treść: zmień odpowiednie pola tekstowe        ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<section id="ogloszenia" class="py-28 bg-sand"
  x-data="{ og: null }"
  x-init="fetch('/api/ogloszenia').then(r => r.json()).then(d => og = d)"
>
  <template x-if="og && (og.koleda.enabled || og.koncert.enabled || og.intencje.enabled)">
    <div class="max-w-6xl mx-auto px-6">

      <!-- Heading -->
      <div class="text-center mb-16" data-aos="fade-up">
        <div class="section-label justify-center">
          <i class="fas fa-bullhorn text-xs"></i> Aktualności
        </div>
        <h2 class="font-serif text-4xl md:text-5xl font-bold text-navy mb-4">Ogłoszenia</h2>
        <div class="divider"></div>
        <p class="text-gray-500 max-w-md mx-auto">Najważniejsze informacje z życia parafii.</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-5xl mx-auto">

        <!-- ═══════════════════════════════════════════
             KOLĘDA
             ═══════════════════════════════════════════ -->
        <template x-if="og.koleda.enabled">
          <div class="grad-card rounded-3xl p-8 text-white lift" :class="!og.koncert.enabled && 'lg:col-span-2'" data-aos="fade-up">
            <div class="flex items-center gap-4 mb-6">
              <div class="icon-circle bg-gold/15 border border-gold/25">
                <i class="fas fa-star text-gold"></i>
              </div>
              <div>
                <div class="text-gold/60 text-[.65rem] tracking-widest uppercase font-medium">Wizyta duszpasterska</div>
                <div class="font-serif text-2xl font-semibold" x-text="'Kolęda ' + og.koleda.rok"></div>
              </div>
            </div>

            <p class="text-white/60 text-sm mb-6" x-text="og.koleda.opis"></p>

            <div class="space-y-2">
              <template x-for="wpis in og.koleda.harmonogram" :key="wpis.dzien">
                <div class="flex justify-between items-center py-3 px-4 rounded-xl bg-white/5 border border-white/8">
                  <span class="text-white/80 text-sm font-medium" x-text="wpis.dzien"></span>
                  <span class="text-gold text-sm" x-text="wpis.ulice"></span>
                </div>
              </template>
            </div>

            <div class="mt-6 p-4 rounded-xl bg-white/5 border border-white/8">
              <p class="text-white/45 text-xs leading-relaxed">
                <i class="fas fa-clock mr-1.5 text-gold/60"></i>
                Kolęda odbywa się w godzinach <span x-text="og.koleda.godziny"></span>. Prosimy o wyrozumiałość w przypadku ewentualnych opóźnień.
              </p>
            </div>
          </div>
        </template>

        <!-- ═══════════════════════════════════════════
             KONCERT
             ═══════════════════════════════════════════ -->
        <template x-if="og.koncert.enabled">
          <div class="bg-gradient-to-br from-navy/5 to-gold/5 rounded-3xl p-8 border border-gold/15 lift" :class="!og.koleda.enabled && 'lg:col-span-2'" data-aos="fade-up">
            <img :src="og.koncert.zdjecie" :alt="og.koncert.tytul" class="w-full h-48 object-cover rounded-2xl mb-6">
            <div class="flex items-center gap-4 mb-6">
              <div class="icon-circle bg-gold/10 border border-gold/20">
                <i class="fas fa-music text-gold text-sm"></i>
              </div>
              <div>
                <div class="text-navy/40 text-[.65rem] tracking-widest uppercase font-medium">Wydarzenie</div>
                <div class="font-serif text-2xl font-semibold text-navy" x-text="og.koncert.tytul"></div>
              </div>
            </div>

            <p class="text-gray-600 text-sm mb-6" x-text="og.koncert.opis"></p>

            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
              <div class="text-center py-4 px-3 rounded-2xl bg-white border border-gray-100">
                <div class="text-navy/40 text-[.6rem] tracking-widest uppercase mb-1">Data</div>
                <div class="font-serif text-lg font-bold text-navy" x-text="og.koncert.data"></div>
              </div>
              <div class="text-center py-4 px-3 rounded-2xl bg-white border border-gray-100">
                <div class="text-navy/40 text-[.6rem] tracking-widest uppercase mb-1">Godzina</div>
                <div class="font-serif text-lg font-bold text-navy" x-text="og.koncert.godzina"></div>
              </div>
              <div class="text-center py-4 px-3 rounded-2xl bg-white border border-gray-100 col-span-2 sm:col-span-1">
                <div class="text-navy/40 text-[.6rem] tracking-widest uppercase mb-1">Wstęp</div>
                <div class="font-serif text-lg font-bold text-gold" x-text="og.koncert.wstep"></div>
              </div>
            </div>
          </div>
        </template>

        <!-- ═══════════════════════════════════════════
             INTENCJE MSZALNE
             (zawsze ostatni w kolejności)
             ═══════════════════════════════════════════ -->
        <template x-if="og.intencje.enabled">
          <div class="lg:col-span-2 bg-white rounded-3xl p-8 shadow-xl border border-gray-100 lift" data-aos="fade-up">
            <div class="flex items-center gap-4 mb-6">
              <div class="icon-circle bg-navy/8 border border-navy/12">
                <i class="fas fa-book-open text-navy text-sm"></i>
              </div>
              <div>
                <div class="text-navy/40 text-[.65rem] tracking-widest uppercase font-medium" x-text="'Tydzień ' + og.intencje.tydzien"></div>
                <div class="font-serif text-2xl font-semibold text-navy">Intencje Mszalne</div>
              </div>
            </div>

            <div class="space-y-1">
              <template x-for="(wpis, i) in og.intencje.wpisy" :key="wpis.dzien">
                <div :class="i < og.intencje.wpisy.length - 1 ? 'py-3.5 border-b border-gray-100' : 'py-3.5'">
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-medium text-navy" x-text="wpis.dzien"></span>
                    <span class="text-xs text-gray-400" x-text="wpis.msze.map(m => m.godzina).join(' · ')"></span>
                  </div>
                  <template x-for="msza in wpis.msze" :key="msza.godzina">
                    <p class="text-gray-500 text-sm"
                       x-text="wpis.msze.length > 1 ? msza.godzina + ' – ' + msza.intencja : msza.intencja"></p>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

      </div>
    </div>
  </template>

  <template x-if="og && !og.koleda.enabled && !og.koncert.enabled && !og.intencje.enabled">
    <div class="max-w-6xl mx-auto px-6">
      <div class="text-center" data-aos="fade-up">
        <div class="section-label justify-center">
          <i class="fas fa-bullhorn text-xs"></i> Aktualności
        </div>
        <h2 class="font-serif text-4xl md:text-5xl font-bold text-navy mb-4">Ogłoszenia</h2>
        <div class="divider"></div>
        <p class="text-gray-400 max-w-md mx-auto mt-6 italic">Ogłoszenia dostępne już wkrótce.</p>
      </div>
    </div>
  </template>
</section>
