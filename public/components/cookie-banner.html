<div
  x-data="{ show: !localStorage.getItem('cookieConsent') }"
  x-show="show"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100 translate-y-0"
  x-transition:leave-end="opacity-0 translate-y-4"
  class="fixed bottom-0 inset-x-0 z-40 bg-navy/95 backdrop-blur border-t border-white/10 shadow-2xl"
>
  <div class="max-w-6xl mx-auto px-5 py-4 flex flex-col sm:flex-row items-start sm:items-center gap-4">
    <p class="text-white/70 text-sm leading-relaxed flex-1">
      <i class="fas fa-cookie-bite text-gold mr-2"></i>
      Ta strona korzysta z plików cookie niezbędnych do jej działania
      oraz wtyczki <strong class="text-white/90">Facebook</strong>
      i mapy <strong class="text-white/90">Google Maps</strong>,
      które mogą zapisywać własne pliki cookie.
      Korzystając ze strony, wyrażasz na to zgodę.
    </p>
    <button
      @click="localStorage.setItem('cookieConsent', '1'); show = false"
      class="shrink-0 px-6 py-2 rounded-full bg-gold hover:bg-gold2 text-white text-sm font-medium transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold/30"
    >
      Rozumiem
    </button>
  </div>
</div>
