<header
  class="fixed inset-x-0 top-0 z-50 transition-all duration-500 py-4 px-5 md:px-8"
  :class="scrolled ? 'nav-scrolled py-3' : 'bg-transparent'"
>
  <div class="max-w-6xl mx-auto flex items-center justify-between">

    <!-- Logo -->
    <a href="#" class="flex items-center gap-3 group">
      <div class="w-10 h-10 rounded-full flex items-center justify-center border border-gold/40 bg-gold/10 group-hover:bg-gold/20 transition-colors">
        <i class="fas fa-cross text-gold text-sm"></i>
      </div>
      <div class="leading-tight">
        <div class="text-white/60 text-[.65rem] tracking-widest uppercase font-medium">Parafia</div>
        <div class="font-serif text-white font-semibold text-sm leading-none gold-text">Zwiastowania Pańskiego</div>
      </div>
    </a>

    <!-- Desktop links -->
    <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-white/80">
      <a href="#ogloszenia" class="nav-link hover:text-gold transition-colors">Ogłoszenia</a>
      <a href="#czytania"   class="nav-link hover:text-gold transition-colors">Czytania</a>
      <a href="#o-parafii"  class="nav-link hover:text-gold transition-colors">O Parafii</a>
      <a href="#historia"  class="nav-link hover:text-gold transition-colors">Historia</a>
      <a href="#grupy"     class="nav-link hover:text-gold transition-colors">Grupy</a>
      <a href="#kontakt"   class="nav-link hover:text-gold transition-colors">Kontakt</a>
      <a href="#msze"
         class="ml-2 px-5 py-2 rounded-full bg-gold hover:bg-gold2 text-white text-sm transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold/30">
        <i class="fas fa-calendar-alt mr-1.5 text-xs"></i>Msze Święte
      </a>
    </nav>

    <!-- Hamburger -->
    <button class="md:hidden text-white p-2" @click="menuOpen = !menuOpen" aria-label="Menu">
      <i class="fas text-xl transition-all" :class="menuOpen ? 'fa-xmark' : 'fa-bars'"></i>
    </button>
  </div>

  <!-- Mobile menu -->
  <div
    x-show="menuOpen"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-2"
    class="md:hidden mt-3 mx-1 rounded-2xl overflow-hidden bg-navy/97 backdrop-blur border border-white/5"
  >
    <nav class="flex flex-col py-3 text-sm font-medium">
      <a href="#msze"       @click="menuOpen=false" class="px-6 py-3 text-white/80 hover:text-gold hover:bg-white/5 transition-colors">Msze Święte</a>
      <a href="#ogloszenia" @click="menuOpen=false" class="px-6 py-3 text-white/80 hover:text-gold hover:bg-white/5 transition-colors">Ogłoszenia</a>
      <a href="#czytania"   @click="menuOpen=false" class="px-6 py-3 text-white/80 hover:text-gold hover:bg-white/5 transition-colors">Czytania</a>
      <a href="#o-parafii"  @click="menuOpen=false" class="px-6 py-3 text-white/80 hover:text-gold hover:bg-white/5 transition-colors">O Parafii</a>
      <a href="#historia"  @click="menuOpen=false" class="px-6 py-3 text-white/80 hover:text-gold hover:bg-white/5 transition-colors">Historia</a>
      <a href="#grupy"     @click="menuOpen=false" class="px-6 py-3 text-white/80 hover:text-gold hover:bg-white/5 transition-colors">Grupy</a>
      <a href="#kontakt"   @click="menuOpen=false" class="px-6 py-3 text-white/80 hover:text-gold hover:bg-white/5 transition-colors">Kontakt</a>
      <div class="px-6 py-3">
        <a href="#msze" @click="menuOpen=false" class="block text-center bg-gold text-white px-4 py-2.5 rounded-full text-sm font-medium">
          <i class="fas fa-calendar-alt mr-2 text-xs"></i>Msze Święte
        </a>
      </div>
    </nav>
  </div>
</header>
